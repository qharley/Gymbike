[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino

monitor_speed = 115200

lib_deps =
  https://github.com/ESP32Async/ESPAsyncWebServer.git
  https://github.com/ESP32Async/AsyncTCP.git
  madhephaestus/ESP32Servo @ ^0.13.0
  bblanchon/ArduinoJson @ ^7.0.4
  bodmer/TFT_eSPI @ ^2.5.43

build_flags =
  -D BUILD_VERSION=\"1.0.0\"
  -D BUILD_DATE=__DATE__
  -D BUILD_TIME=__TIME__
  -D USER_SETUP_LOADED=1
  -D ILI9486_DRIVER=1
  -D TFT_WIDTH=320
  -D TFT_HEIGHT=480
  -D TFT_MOSI=23
  -D TFT_MISO=19
  -D TFT_SCLK=18
  -D TFT_CS=5
  -D TFT_DC=17
  -D TFT_RST=16
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D LOAD_FONT4=1
  -D LOAD_FONT6=1
  -D LOAD_FONT7=1
  -D LOAD_FONT8=1
  -D LOAD_GFXFF=1
  -D SMOOTH_FONT=1
  -D SPI_FREQUENCY=27000000
  -D SPI_READ_FREQUENCY=20000000

; OTA environment - use after initial USB upload
[env:nodemcu-32s-ota]
extends = env:nodemcu-32s
upload_protocol = espota
; upload_port = gymbike.local
upload_port = 192.168.42.88
upload_flags =
  --port=3232
  --auth=gymbike123
