<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GymBike Emergency Display</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #0f0;
        font-family: "Courier New", monospace;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .container {
        text-align: center;
        width: 100%;
        padding: 20px;
      }
      .value {
        font-size: 80px;
        font-weight: bold;
        margin: 10px 0;
        text-shadow: 0 0 10px #0f0;
      }
      .label {
        font-size: 20px;
        color: #0a0;
      }
      .status {
        position: fixed;
        top: 10px;
        right: 10px;
        font-size: 12px;
      }
      .error {
        color: #f00;
        text-shadow: 0 0 10px #f00;
      }
    </style>
  </head>
  <body>
    <div class="status" id="status">⚫</div>
    <div class="container">
      <div class="label">CADENCE</div>
      <div class="value" id="cadence">--</div>
      <br />
      <div class="label">RESISTANCE</div>
      <div class="value" id="resistance">--</div>
    </div>

    <script>
      // Get IP from URL or prompt
      let ip = window.location.hostname || prompt("ESP32 IP:", "192.168.1.100");
      if (!ip || ip === "localhost" || ip === "") {
        ip = prompt("ESP32 IP:", "192.168.1.100");
      }

      const status = document.getElementById("status");
      const cadence = document.getElementById("cadence");
      const resistance = document.getElementById("resistance");

      function update() {
        fetch("http://" + ip + "/api/status")
          .then((r) => r.json())
          .then((d) => {
            cadence.textContent = d.cadence;
            resistance.textContent = d.resistance;
            status.textContent = "●";
            status.className = "status";
          })
          .catch((e) => {
            status.textContent = "✗";
            status.className = "status error";
          });
      }

      setInterval(update, 1000);
      update();
    </script>
  </body>
</html>
